<svg xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2cff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="techGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <symbol id="team-icon" viewBox="0 0 64 64">
    <rect x="2" y="2" width="60" height="60" rx="8" fill="#1a1a2e" stroke="url(#ueGrad)" stroke-width="2"/>
    <circle cx="20" cy="24" r="8" fill="none" stroke="url(#techGrad)" stroke-width="2"/>
    <path d="M8 48c0-6.627 5.373-12 12-12s12 5.373 12 12" fill="none" stroke="url(#techGrad)" stroke-width="2"/>
    <circle cx="44" cy="24" r="8" fill="none" stroke="url(#techGrad)" stroke-width="2"/>
    <path d="M32 48c0-6.627 5.373-12 12-12s12 5.373 12 12" fill="none" stroke="url(#techGrad)" stroke-width="2"/>
    <circle cx="32" cy="42" r="6" fill="url(#ueGrad)" filter="url(#glow)"/>
  </symbol>
  
  <symbol id="task-icon" viewBox="0 0 64 64">
